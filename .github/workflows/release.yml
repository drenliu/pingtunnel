name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.18'

      - name: Build and zip
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          BIN="pingtunnel${EXT}"
          go build -trimpath -ldflags="-s -w" -o "$BIN" .
          if [ "$GOOS" != "windows" ]; then chmod +x "$BIN"; fi
          ZIP="pingtunnel_${VERSION}_${GOOS}_${GOARCH}.zip"
          zip "$ZIP" "$BIN"
          mkdir -p upload
          mv "$ZIP" upload/

      - uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.goos }}-${{ matrix.goarch }}
          path: upload/*.zip

  release:
    name: Upload to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          pattern: zip-*
          merge-multiple: true

      - name: List assets
        run: ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
